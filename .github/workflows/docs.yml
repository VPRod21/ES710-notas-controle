name: Documentacion

on:
  push:
    branches:
      - main
    tags: "*"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar
        uses: actions/checkout@v4

      - name: Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Compilar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          julia --project=docs -e 'using Pkg; Pkg.instantiate()'
          julia --project=docs docs/make.jl
